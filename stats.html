<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b14">
<title>Dictami — Статистика</title>
<style>
  :root {
    --bg: #0b0b14;
    --bg-card: rgba(255,255,255,0.045);
    --line: rgba(255,255,255,0.09);
    --text: #f2f1fa;
    --muted: #8b89a6;
    --violet: #8b6cff;
    --violet-soft: rgba(139,108,255,0.16);
    --glow: rgba(139,108,255,0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    min-height: 100vh;
    padding: max(20px, env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom));
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,108,255,0.13), transparent),
      radial-gradient(ellipse 60% 40% at 90% 110%, rgba(108,124,255,0.08), transparent);
    background-attachment: fixed;
  }
  .wrap { max-width: 560px; margin: 0 auto; }

  header { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; padding-top: 6px; }
  .logo-wave { display: flex; align-items: center; gap: 2.5px; height: 30px; }
  .logo-wave i {
    width: 3.5px; border-radius: 2px; display: block;
    background: linear-gradient(180deg, #bfd4ff, var(--violet));
    box-shadow: 0 0 8px var(--glow);
    animation: wv 1.3s ease-in-out infinite;
  }
  .logo-wave i:nth-child(1) { height: 10px; animation-delay: 0s; }
  .logo-wave i:nth-child(2) { height: 18px; animation-delay: .15s; }
  .logo-wave i:nth-child(3) { height: 26px; animation-delay: .3s; }
  .logo-wave i:nth-child(4) { height: 16px; animation-delay: .45s; }
  .logo-wave i:nth-child(5) { height: 9px;  animation-delay: .6s; }
  @keyframes wv { 0%,100% { transform: scaleY(0.6); } 50% { transform: scaleY(1); } }
  @media (prefers-reduced-motion: reduce) { .logo-wave i { animation: none; } }

  h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; }
  h1 span { color: var(--muted); font-weight: 500; }
  .updated { margin-left: auto; font-size: 11px; color: var(--muted); text-align: right; line-height: 1.4; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 18px 18px 16px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .card.hero {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--violet-soft), rgba(255,255,255,0.03) 55%);
    border-color: rgba(139,108,255,0.3);
  }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .num {
    font-size: 34px; font-weight: 700; letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums; line-height: 1;
  }
  .hero .num { font-size: 52px; background: linear-gradient(90deg, #dcd4ff, var(--violet)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 7px; }
  .delta { display: inline-block; font-size: 12px; font-weight: 600; margin-top: 7px; padding: 3px 9px; border-radius: 99px; }
  .delta.up { color: #7ee2a8; background: rgba(80,220,140,0.12); }
  .delta.down { color: #ff9d97; background: rgba(255,110,100,0.1); }
  .delta.flat { color: var(--muted); background: rgba(255,255,255,0.06); }

  .chart-card { margin-bottom: 12px; }
  .chart { display: flex; align-items: flex-end; gap: 5px; height: 130px; margin-top: 14px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; min-width: 0; }
  .bar {
    width: 100%; max-width: 26px; border-radius: 6px 6px 3px 3px;
    background: linear-gradient(180deg, var(--violet), rgba(139,108,255,0.35));
    min-height: 3px;
    transition: height .5s cubic-bezier(.2,.7,.2,1);
    position: relative;
  }
  .bar.today { background: linear-gradient(180deg, #c3b3ff, var(--violet)); box-shadow: 0 0 14px var(--glow); }
  .bar-v { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .bar-d { font-size: 10px; color: var(--muted); }
  .bar-col.today .bar-d, .bar-col.today .bar-v { color: #cfc3ff; font-weight: 600; }

  .foot { text-align: center; margin-top: 22px; }
  .foot a { color: var(--muted); font-size: 12px; text-decoration: none; }
  .foot a:hover { color: var(--violet); }

  .state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; display: none; }
  .state.show { display: block; }
  .state .spin {
    width: 26px; height: 26px; margin: 0 auto 14px;
    border: 2.5px solid var(--line); border-top-color: var(--violet);
    border-radius: 50%; animation: sp 0.8s linear infinite;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
  #dash { display: none; }
  #dash.show { display: block; }

  .refresh {
    display: block; width: 100%; margin-top: 16px;
    background: var(--violet-soft); color: #cfc3ff;
    border: 1px solid rgba(139,108,255,0.35); border-radius: 16px;
    padding: 14px; font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .refresh:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-wave"><i></i><i></i><i></i><i></i><i></i></div>
    <h1>Dictami <span>· статистика</span></h1>
    <div class="updated" id="updated"></div>
  </header>

  <div class="state show" id="loading"><div class="spin"></div>Загружаю данные…</div>

  <div class="state" id="error">
    Не удалось получить данные.<br>
    Проверь, что в GoatCounter включён<br>«visitor counter» (Settings).
  </div>

  <div id="dash">
    <div class="grid">
      <div class="card hero">
        <div class="label">Посетители сегодня</div>
        <div class="num" id="today">–</div>
        <span class="delta flat" id="todayDelta"></span>
      </div>
      <div class="card">
        <div class="label">За 7 дней</div>
        <div class="num" id="week">–</div>
        <div class="sub" id="weekAvg"></div>
      </div>
      <div class="card">
        <div class="label">За 30 дней</div>
        <div class="num" id="month">–</div>
        <div class="sub" id="monthAvg"></div>
      </div>
    </div>

    <div class="card chart-card">
      <div class="label">Последние 7 дней</div>
      <div class="chart" id="chart"></div>
    </div>

    <button class="refresh" id="refreshBtn">Обновить</button>
  </div>

  <div class="foot"><a href="https://dictami.goatcounter.com" target="_blank" rel="noopener">Полная статистика →</a></div>
</div>

<script>
const SITE = 'https://dictami.goatcounter.com';
const DAYS_RU = ['вс','пн','вт','ср','чт','пт','сб'];

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseCount(s) {
  const n = parseInt(String(s).replace(/[^\d]/g, ''), 10);
  return isNaN(n) ? 0 : n;
}
async function fetchCount(start, end) {
  const u = SITE + '/counter/TOTAL.json?start=' + start + '&end=' + end;
  const r = await fetch(u);
  if (!r.ok) throw new Error('http ' + r.status);
  const j = await r.json();
  return parseCount(j.count_unique !== undefined ? j.count_unique : j.count);
}

async function load() {
  document.getElementById('loading').classList.add('show');
  document.getElementById('error').classList.remove('show');
  document.getElementById('dash').classList.remove('show');
  try {
    const now = new Date();
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      days.push(d);
    }
    // per-day counts for the chart (7 requests), plus 30-day total
    const dayCounts = await Promise.all(days.map(d => {
      const s = fmtDate(d);
      return fetchCount(s, s).catch(() => 0);
    }));
    const d30 = new Date(now); d30.setDate(d30.getDate() - 29);
    const monthTotal = await fetchCount(fmtDate(d30), fmtDate(now)).catch(() => 0);

    const today = dayCounts[6];
    const yesterday = dayCounts[5];
    const weekTotal = dayCounts.reduce((a,b) => a+b, 0);

    document.getElementById('today').textContent = today.toLocaleString('ru-RU');
    document.getElementById('week').textContent = weekTotal.toLocaleString('ru-RU');
    document.getElementById('month').textContent = monthTotal.toLocaleString('ru-RU');
    document.getElementById('weekAvg').textContent = '≈ ' + Math.round(weekTotal/7).toLocaleString('ru-RU') + ' в день';
    document.getElementById('monthAvg').textContent = '≈ ' + Math.round(monthTotal/30).toLocaleString('ru-RU') + ' в день';

    const deltaEl = document.getElementById('todayDelta');
    const diff = today - yesterday;
    if (diff > 0) { deltaEl.className = 'delta up'; deltaEl.textContent = '↑ +' + diff + ' ко вчера'; }
    else if (diff < 0) { deltaEl.className = 'delta down'; deltaEl.textContent = '↓ ' + diff + ' ко вчера'; }
    else { deltaEl.className = 'delta flat'; deltaEl.textContent = 'как вчера'; }

    const max = Math.max(1, ...dayCounts);
    const chart = document.getElementById('chart');
    chart.innerHTML = '';
    days.forEach((d, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col' + (i === 6 ? ' today' : '');
      const v = document.createElement('div'); v.className = 'bar-v'; v.textContent = dayCounts[i];
      const bar = document.createElement('div');
      bar.className = 'bar' + (i === 6 ? ' today' : '');
      bar.style.height = Math.max(3, Math.round(dayCounts[i] / max * 82)) + 'px';
      const lab = document.createElement('div'); lab.className = 'bar-d';
      lab.textContent = i === 6 ? 'сегодня' : DAYS_RU[d.getDay()];
      col.appendChild(v); col.appendChild(bar); col.appendChild(lab);
      chart.appendChild(col);
    });

    document.getElementById('updated').textContent = 'обновлено\n' + now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('loading').classList.remove('show');
    document.getElementById('dash').classList.add('show');
  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('error').classList.add('show');
  }
}

document.getElementById('refreshBtn').addEventListener('click', load);
load();
</script>
</body>
</html>
